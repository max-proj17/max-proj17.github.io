<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="style.css" rel="stylesheet">
    <title>Maximelio Finch - Portfolio</title>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">
    <div id="navbar"></div>
    <div id="about"></div>
    <div id="experience"></div>
    <div id="projects"></div>
    <div id="skills"></div>
    <div id="Societies&Clubs"></div>
    <div id="achievements"></div>
    <div id="footer"></div>

        <!-- JavaScript to load other HTML files -->
    <script>
        async function includeHTML() {
            const sections = ['navbar', 'about', 'experience', 'projects', 'skills', 'achievements', 'footer'];
            for (const section of sections) {
                try {
                    const response = await fetch(`${section}.html`);
                    if (response.ok) {
                        document.getElementById(section).innerHTML = await response.text();
                    } else {
                        document.getElementById(section).innerHTML = "Section not found.";
                    }
                } catch (error) {
                    console.error('Error fetching section:', error);
                }
            }
            
            // Now, instead of calling setupEventListeners and setupSlideshow here,
            // load the prop.js script and call them after it's loaded.
            loadPropJS();
        }

        function loadPropJS() {
            const script = document.createElement('script');
            script.src = 'prop.js';
            script.onload = () => {
                // Call the functions after the prop.js script is loaded.
                setupEventListeners(); // Now these functions will be defined
                setupSlideshow();
            };
            document.body.appendChild(script);
        }
        
        includeHTML();
    </script>


    <!-- prop.js Script -->
    <!-- <script src="prop.js"></script> -->
</body>
</html>
